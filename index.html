<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股精準即時行情查詢系統 v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 min-h-screen py-10 px-4 font-sans text-slate-100">

    <div class="max-w-md mx-auto bg-slate-800 rounded-3xl shadow-2xl overflow-hidden p-6 border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white flex justify-center items-center gap-2">
                📊 台股精準即時查詢 <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded-full font-normal border border-emerald-500/20">v2.0 GAS連線版</span>
            </h1>
            <p class="text-xs text-slate-400 mt-1.5">整合證交所盤中即時數據 · 自動判定紅漲綠跌</p>
        </div>

        <div class="flex gap-2 mb-6">
            <input 
                type="text" 
                id="stockCode" 
                placeholder="輸入代碼，如：2330" 
                maxlength="6"
                class="flex-1 px-4 py-3 bg-slate-950/50 border border-slate-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-xl text-center text-white placeholder-slate-500"
                value="2330"
            >
            <button 
                onclick="queryStock()" 
                id="searchBtn"
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-2xl transition duration-200 shadow-lg active:scale-95"
            >
                查詢
            </button>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin inline-block w-9 h-9 border-4 border-blue-500 border-t-transparent rounded-full mb-3"></div>
            <p class="text-slate-400 text-sm tracking-wide">正在透過 GAS 中繼站讀取證交所即時數據...</p>
        </div>

        <div id="errorBox" class="hidden bg-red-950/50 border border-red-800 text-red-300 p-4 rounded-2xl text-sm mb-4">
            ⚠️ <span>查詢失敗：找不到該股票或目前非盤中交易時間。</span>
        </div>

        <div id="resultBox" class="hidden transition-all duration-300">
            <div class="border-b border-slate-700 pb-4 mb-4 flex justify-between items-baseline">
                <div>
                    <h2 id="stockName" class="text-2xl font-extrabold text-white">--</h2>
                    <p id="queryTime" class="text-xs text-slate-400 mt-1">資料時間：--</p>
                </div>
                <span id="stockId" class="text-slate-400 font-mono text-base font-semibold">(--)</span>
            </div>

            <div id="priceCard" class="bg-slate-900/60 rounded-2xl p-5 text-center mb-4 border border-slate-700/50 transition-all duration-300">
                <div class="text-xs text-slate-400 mb-1 tracking-wider">當前即時成交價</div>
                <div id="currentPrice" class="text-5xl font-black font-mono tracking-tight my-1.5">--</div>
                <div class="flex justify-center gap-2 text-base font-bold">
                    <span id="priceChange">--</span>
                    <span id="priceChangePercent">--</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-sm">
                <div class="bg-slate-900/40 p-3 rounded-xl flex justify-between border border-slate-700/30">
                    <span class="text-slate-400">昨收價</span>
                    <span id="yesterdayPrice" class="font-mono font-semibold text-slate-200">--</span>
                </div>
                <div class="bg-slate-900/40 p-3 rounded-xl flex justify-between border border-slate-700/30">
                    <span class="text-slate-400">開盤價</span>
                    <span id="openPrice" class="font-mono font-semibold text-slate-200">--</span>
                </div>
                <div class="bg-slate-900/40 p-3 rounded-xl flex justify-between border border-slate-700/30">
                    <span class="text-slate-400">最高價</span>
                    <span id="highPrice" class="font-mono font-semibold text-red-500">--</span>
                </div>
                <div class="bg-slate-900/40 p-3 rounded-xl flex justify-between border border-slate-700/30">
                    <span class="text-slate-400">最低價</span>
                    <span id="lowPrice" class="font-mono font-semibold text-green-500">--</span>
                </div>
            </div>
            
            <div class="bg-slate-900/40 p-3 rounded-xl flex justify-between border border-slate-700/30 mt-3 text-sm">
                <span class="text-slate-400">當日累積成交量</span>
                <span id="volume" class="font-mono font-bold text-amber-400">-- 張</span>
            </div>
        </div>

        <div class="mt-8 text-center text-[11px] text-slate-500 border-t border-slate-700/50 pt-4 leading-relaxed">
            數據源自台灣證券交易所 · 盤中每5秒更新一次<br>本專案採用 MIT License 開源授權
        </div>
    </div>

    <script>
        // ⚠️ 【請在此處替換成你剛剛複製的 GAS 網頁應用程式 URL】
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNI6buogWxdQFjYULOO6PfCILZpOTZfzJVl2SUyRVU9QgBIZSPH0kITwJmnCn0Ds1R9A/exec";

        document.getElementById('stockCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') queryStock();
        });

        async function queryStock() {
            const stockCode = document.getElementById('stockCode').value.trim();
            if (!stockCode) {
                alert('請輸入股票代碼！');
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');

            try {
                // 發送請求給 GAS 微後端中繼站
                const response = await fetch(`${GAS_WEB_APP_URL}?code=${stockCode}`);
                if (!response.ok) throw new Error('連線中繼站失敗');
                
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // 渲染基礎欄位
                document.getElementById('stockName').innerText = data.name;
                document.getElementById('stockId').innerText = `(${data.code})`;
                document.getElementById('currentPrice').innerText = data.currentPrice.toFixed(2);
                document.getElementById('yesterdayPrice').innerText = data.yesterdayPrice.toFixed(2);
                document.getElementById('openPrice').innerText = data.openPrice.toFixed(2);
                document.getElementById('highPrice').innerText = data.highPrice.toFixed(2);
                document.getElementById('lowPrice').innerText = data.lowPrice.toFixed(2);
                document.getElementById('volume').innerText = data.volume.toLocaleString() + " 張";
                document.getElementById('queryTime').innerText = `資料時間：${data.time || new Date().toLocaleTimeString()}`;

                // 💡 台股視覺邏輯：紅漲、綠跌、白平盤
                const priceText = document.getElementById('currentPrice');
                const changeText = document.getElementById('priceChange');
                const percentText = document.getElementById('priceChangePercent');
                const priceCard = document.getElementById('priceCard');

                const change = data.priceChange;
                const percent = data.priceChangePercent;

                if (change > 0) {
                    // 漲：紅色
                    priceText.className = "text-5xl font-black font-mono tracking-tight my-1.5 text-red-500";
                    changeText.innerText = `▲ ${change.toFixed(2)}`;
                    percentText.innerText = `+${percent.toFixed(2)}%`;
                    changeText.className = "text-red-500";
                    percentText.className = "text-red-500";
                    priceCard.className = "bg-red-950/20 rounded-2xl p-5 text-center mb-4 border border-red-900/30 transition-all duration-300";
                } else if (change < 0) {
                    // 跌：綠色
                    priceText.className = "text-5xl font-black font-mono tracking-tight my-1.5 text-green-500";
                    changeText.innerText = `▼ ${Math.abs(change).toFixed(2)}`;
                    percentText.innerText = `${percent.toFixed(2)}%`;
                    changeText.className = "text-green-500";
                    percentText.className = "text-green-500";
                    priceCard.className = "bg-green-950/20 rounded-2xl p-5 text-center mb-4 border border-green-900/30 transition-all duration-300";
                } else {
                    // 平盤：白色/灰色
                    priceText.className = "text-5xl font-black font-mono tracking-tight my-1.5 text-slate-100";
                    changeText.innerText = "● 0.00";
                    percentText.innerText = "0.00%";
                    changeText.className = "text-slate-400";
                    percentText.className = "text-slate-400";
                    priceCard.className = "bg-slate-900/60 rounded-2xl p-5 text-center mb-4 border border-slate-700/50 transition-all duration-300";
                }

                document.getElementById('resultBox').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                const errorMsgSpan = document.querySelector('#errorBox span');
                errorMsgSpan.innerText = error.message || "查詢失敗，請稍後再試。";
                document.getElementById('errorBox').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // 預設載入查台積電
        window.onload = function() {
            if(GAS_WEB_APP_URL === "請將你的GAS網頁應用程式網址貼在這裡") {
                alert("請記得在程式碼中修改 GAS_WEB_APP_URL 變數，才能正常查詢喔！");
            } else {
                queryStock();
            }
        };
    </script>
</body>
</html>
